<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let chart;

function renderChart(data){
  const ctx = document.getElementById('chart');

  const labels = data.detail.map(d => d[0]);
  const values = data.detail.map(d => d[2]);

  if(chart){ chart.destroy(); }

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Penjualan',
        data: values
      }]
    }
  });
}
