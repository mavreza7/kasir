<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Matcha Kyoto</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body {
  background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93') no-repeat center center fixed;
  background-size: cover;
  color: white;
}
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}
.card { background: rgba(30,41,59,0.85); border-radius: 15px; }
.btn-custom { background: #22c55e; border: none; }
</style>
</head>
<body>
<div class="container py-5">
<h2 class="text-center mb-4">🍵 Kasir Matcha Kyoto</h2>

<div class="card p-4">
<div class="row" id="menu"></div>
<button class="btn btn-custom mt-3" onclick="hitung()">Hitung</button>
</div>

<div id="hasil" class="mt-4"></div>
<button class="btn btn-warning mt-3" onclick="downloadPDF()">Download PDF</button>
</div>

<script>
const menu = {
  "MATCHA LATTE": {harga:12000,hpp:6459},
  "MATCHA PINKBERY": {harga:12000,hpp:6543},
  "MATCHA ORIGINAL": {harga:10000,hpp:4933},
  "MATCHA SEASALT": {harga:15000,hpp:8599}
};

function rupiah(x){return 'Rp'+x.toLocaleString('id-ID');}

const menuDiv = document.getElementById('menu');
for(let m in menu){
  menuDiv.innerHTML += `
  <div class="col-md-6 mb-3">
    <label>${m}</label>
    <input type="number" id="${m}" class="form-control" value="0">
  </div>`;
}

let lastData = null;

function hitung(){
  let totalJual=0, totalUntung=0;
  let detail=[];

  for(let m in menu){
    let qty = parseInt(document.getElementById(m).value)||0;
    let harga = menu[m].harga;
    let hpp = menu[m].hpp;
    let untung = harga - hpp;

    let total = harga*qty;
    let u = untung*qty;

    totalJual+=total;
    totalUntung+=u;

    detail.push([m, qty, total, u]);
  }

  let modal = totalJual - totalUntung;

  lastData = {totalJual,totalUntung,modal,detail};

  document.getElementById('hasil').innerHTML = `
    <div class="card p-3 text-center">
      <h5>Total Penjualan</h5><h3>${rupiah(totalJual)}</h3>
      <h5>Total Untung</h5><h3>${rupiah(totalUntung)}</h3>
      <h5>Total Modal</h5><h3>${rupiah(modal)}</h3>
    </div>`;
}

function downloadPDF(){
  if(!lastData){alert('Hitung dulu!');return;}

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Laporan Kasir Matcha",10,10);
  let y=20;

  lastData.detail.forEach(d=>{
    doc.text(`${d[0]} (${d[1]}): ${rupiah(d[2])}`,10,y);
    y+=10;
  });

  doc.text(`Total: ${rupiah(lastData.totalJual)}`,10,y+10);
  doc.text(`Untung: ${rupiah(lastData.totalUntung)}`,10,y+20);

  doc.save("laporan.pdf");
}
</script>
</body>
</html>
