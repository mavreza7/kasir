<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Matcha Kyoto PRO</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#0f172a,#020617);
  color: #ffffff;
}

* { color: #ffffff !important; }

.container-box { max-width: 1100px; margin: auto; }

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
}

.menu-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.qty-box {
  display: flex;
  align-items: center;
  gap: 10px;
}

.qty-btn {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  border: none;
  background: #22c55e;
}

.qty-input {
  width: 60px;
  text-align: center;
  background: rgba(255,255,255,0.2);
  border: none;
  border-radius: 8px;
}

.btn-main {
  background: linear-gradient(45deg,#22c55e,#16a34a);
  border: none;
  border-radius: 10px;
  padding: 10px;
}
</style>
</head>

<body>
<div class="container-box py-4">
<h2 class="text-center mb-4">☕ Kasir Matcha Kyoto PRO</h2>

<div class="card p-4">
<div id="menu"></div>
<button class="btn btn-main w-100 mt-3" onclick="hitung()">Hitung</button>
</div>

<div id="hasil" class="mt-4"></div>
<canvas id="chart" class="mt-4"></canvas>
<button class="btn btn-warning w-100 mt-3" onclick="downloadPDF()">Download PDF</button>
</div>

<script>
const menu = {
  "MATCHA LATTE": {harga:12000,hpp:6459},
  "MATCHA PINKBERY": {harga:12000,hpp:6543},
  "MATCHA ORIGINAL": {harga:10000,hpp:4933},
  "MATCHA SEASALT": {harga:15000,hpp:8599}
};

function rupiah(x){return 'Rp'+x.toLocaleString('id-ID');}

const menuDiv = document.getElementById('menu');

let qtyData = {};

for(let m in menu){
  qtyData[m] = 0;
  menuDiv.innerHTML += `
  <div class="menu-item">
    <div>
      <strong>${m}</strong><br>
      <small>${rupiah(menu[m].harga)}</small>
    </div>
    <div class="qty-box">
      <button class="qty-btn" onclick="ubahQty('${m}',-1)">-</button>
      <input type="number" min="0" value="0" class="qty-input" id="input-${m}" oninput="syncInput('${m}')">
      <button class="qty-btn" onclick="ubahQty('${m}',1)">+</button>
    </div>
  </div>`;
}

function ubahQty(nama, val){
  qtyData[nama] = Math.max(0, qtyData[nama] + val);
  document.getElementById('input-'+nama).value = qtyData[nama];
}

function syncInput(nama){
  let val = parseInt(document.getElementById('input-'+nama).value) || 0;
  qtyData[nama] = Math.max(0,val);
}

let lastData=null;
let chart;

function hitung(){
  let totalJual=0, totalUntung=0;
  let detail=[];

  for(let m in menu){
    let qty = qtyData[m];
    let harga = menu[m].harga;
    let hpp = menu[m].hpp;
    let untung = harga-hpp;

    let total = harga*qty;
    let u = untung*qty;

    totalJual+=total;
    totalUntung+=u;

    detail.push([m, qty, total]);
  }

  let modal = totalJual-totalUntung;

  lastData={totalJual,totalUntung,modal,detail};

  document.getElementById('hasil').innerHTML = `
  <div class="row text-center">
    <div class="col-md-4"><div class="card p-3"><h5>Penjualan</h5><h3>${rupiah(totalJual)}</h3></div></div>
    <div class="col-md-4"><div class="card p-3"><h5>Untung</h5><h3>${rupiah(totalUntung)}</h3></div></div>
    <div class="col-md-4"><div class="card p-3"><h5>Modal</h5><h3>${rupiah(modal)}</h3></div></div>
  </div>`;

  renderChart(lastData);
}

function renderChart(data){
  const ctx = document.getElementById('chart');

  const labels = data.detail.map(d=>d[0]);
  const values = data.detail.map(d=>d[2]);

  if(chart){chart.destroy();}

  Chart.defaults.color="#ffffff";

  chart = new Chart(ctx,{
    type:'bar',
    data:{ labels:labels, datasets:[{label:'Penjualan',data:values}] }
  });
}

function downloadPDF(){
  if(!lastData){alert('Hitung dulu!');return;}

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Laporan Kasir",10,10);
  let y=20;

  lastData.detail.forEach(d=>{
    doc.text(`${d[0]} (${d[1]}): ${rupiah(d[2])}`,10,y);
    y+=10;
  });

  doc.text(`Total: ${rupiah(lastData.totalJual)}`,10,y+10);
  doc.save("laporan.pdf");
}
</script>
</body>
</html>
